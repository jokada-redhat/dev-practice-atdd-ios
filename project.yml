name: Libratta
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  Libratta:
    type: application
    platform: iOS
    sources:
      - path: Libratta
      - path: Sources/Libratta
    settings:
      base:
        INFOPLIST_FILE: Libratta/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.libratta

  LibrattaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LibrattaTests
        excludes:
          - "Features/**"
    resources:
      - path: LibrattaTests/Features
    dependencies:
      - target: Libratta
    settings:
      base:
        INFOPLIST_FILE: LibrattaTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Libratta.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Libratta"
        BUNDLE_LOADER: "$(TEST_HOST)"

  LibrattaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LibrattaUITests
        excludes:
          - "Features/**"
    resources:
      - path: LibrattaUITests/Features
    dependencies:
      - target: Libratta
    settings:
      base:
        INFOPLIST_FILE: LibrattaUITests/Info.plist
        TEST_TARGET_NAME: Libratta
